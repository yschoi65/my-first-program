<html>
<body>

<h2>나의 첫 AI Agent</h2>

<input id="question" placeholder="질문하세요">
<button onclick="askAI()">AI 질문</button>

<p id="answer"></p>

<script>
async function askAI() {

let question =
document.getElementById("question").value;

let response = await fetch(
"https://api.openai.com/v1/chat/completions",
{
method: "POST",
headers: {
"Content-Type": "application/json",
"Authorization": "Bearer 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"
},
body: JSON.stringify({
model: "gpt-4o-mini",
messages: [
{role:"user",content:question}
]
})
});

let data = await response.json();

document.getElementById("answer")
.innerText =
data.choices[0].message.content;

}
</script>

</body>
</html>
